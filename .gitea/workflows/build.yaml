name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Initialize submodules
        env:
          DEPLOY_KEY: ${{ secrets.AISLE9_ASSETS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_KEY}" > ~/.ssh/aisle9_assets_key
          chmod 600 ~/.ssh/aisle9_assets_key
          ssh-keyscan -p 222 192.168.18.16 >> ~/.ssh/known_hosts 2>/dev/null
          git config --global core.sshCommand "ssh -i ~/.ssh/aisle9_assets_key"
          git config --global url."ssh://git@192.168.18.16:222/".insteadOf "git@gitea.grzanka.org:"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libx11-dev libxxf86vm-dev libgl1-mesa-dev libudev-dev libvulkan-dev

      - name: Build project
        run: cargo build

      - name: Run tests
        run: cargo test

